<footer class="site-footer">
    <div class="container">
        <div class="footer-content">
            <p>&copy; {{ 'now' | date: "%Y" }} <strong>{{ site.title }}</strong>. Tutti i diritti riservati.</p>
            
            <div class="legal-info">
                <p>
                    {{ site.company_name }} | Sede legale: {{ site.address }}<br>
                    P.IVA: {{ site.p_iva }} | C.F.: {{ site.codice_fiscale }} | REA: {{ site.rea }}<br>
                    EMAIL: <a href="mailto:{{ site.pec }}">{{ site.email }}</a>
                </p>
            </div>

            <nav class="footer-nav">
                <a href="{{ '/privacy-policy' | relative_url }}">Privacy Policy</a> |
                <a href="{{ '/cookie-policy' | relative_url }}">Cookie Policy</a> |
                <a href="{{ '/termini-e-condizioni' | relative_url }}">Condizioni di Vendita</a>
            </nav>
        </div>
    </div>
</footer>
