<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'orto di Mezza Luna</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2d6a4f;
            --secondary: #95d5b2;
            --light: #f8f9fa;
            --dark: #1b4332;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--light);
            margin: 0;
            /* Aumentato il padding per non coprire gli ultimi prodotti */
            padding-bottom: 160px; 
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 1rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .card h3 {
            font-size: 1rem;
            margin: 5px 0;
            color: var(--dark);
        }

        .price {
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-qty {
            background: var(--secondary);
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Barra Ordine in basso aggiornata */
        .cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            padding: 20px 0;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 1000;
        }

        #total-display {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--dark);
        }

        .btn-send {
            background-color: #25D366;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-send:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<header>
    <h1>L'orto di Mezza Luna</h1>
    <p>Scegli i prodotti e prenota su WhatsApp</p>
</header>

<div class="container">
    <div id="product-list" class="product-grid">
        <p>Caricamento prodotti freschi...</p>
    </div>
</div>

<div class="cart-bar">
    <div id="total-display">Totale: 0.00 €</div>
    <button class="btn-send" onclick="confirmAndSend()">Prenota su WhatsApp</button>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQfuyKN0VDDVw9wil0C9gXieyh1MnZjyRbijRqf9tQzmuThtVErJjkqkR2GE1IRBGuCS1FH0iR0-hAK/pub?output=csv'; 
    const PHONE_NUMBER = '393348462556'; 

    let products = [];
    let cart = {};

    async function loadProducts() {
        try {
            const response = await fetch(SHEET_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);

            const container = document.getElementById('product-list');
            container.innerHTML = '';

            rows.forEach((row, index) => {
                // Pulizia della riga per gestire eventuali virgole nei testi tra virgolette
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length < 3) return;

                const p = {
                    id: index,
                    name: cols[0].replace(/"/g, '').trim(),
                    price: parseFloat(cols[2]),
                    unit: cols[3].trim(),
                    available: cols[4].trim().toUpperCase() === 'SÌ',
                    img: cols[5] ? cols[5].trim() : 'https://via.placeholder.com/150?text=Verdura'
                };

                if (p.available) {
                    products.push(p);
                    container.innerHTML += `
                        <div class="card">
                            <img src="${p.img}" alt="${p.name}">
                            <h3>${p.name}</h3>
                            <div class="price">${p.price.toFixed(2)}€ / ${p.unit}</div>
                            <div class="controls">
                                <button class="btn-qty" onclick="changeQty(${p.id}, -1)">-</button>
                                <span id="qty-${p.id}">0</span>
                                <button class="btn-qty" onclick="changeQty(${p.id}, 1)">+</button>
                            </div>
                        </div>
                    `;
                }
            });
        } catch (error) {
            console.error("Errore caricamento:", error);
            document.getElementById('product-list').innerHTML = "Errore nel caricamento dei prodotti.";
        }
    }

    function changeQty(id, delta) {
        if (!cart[id]) cart[id] = 0;
        cart[id] += delta;
        if (cart[id] < 0) cart[id] = 0;
        
        document.getElementById(`qty-${id}`).innerText = cart[id];
        updateTotal();
    }

    function updateTotal() {
        let total = 0;
        products.forEach(p => {
            if (cart[p.id]) total += p.price * cart[p.id];
        });
        document.getElementById('total-display').innerText = `Totale: ${total.toFixed(2)} €`;
    }

    function confirmAndSend() {
        let orderList = "";
        let total = 0;
        let hasItems = false;

        products.forEach(p => {
            if (cart[p.id] > 0) {
                const subtotal = p.price * cart[p.id];
                orderList += `- ${p.name}: ${cart[p.id]} ${p.unit} (${subtotal.toFixed(2)}€)\n`;
                total += subtotal;
                hasItems = true;
            }
        });

        if (!hasItems) {
            alert("Il carrello è vuoto! Seleziona almeno un prodotto.");
            return;
        }

        // Messaggio di riepilogo per l'utente
        const summary = `RIEPILOGO ORDINE:\n\n${orderList}\nTOTALE: ${total.toFixed(2)}€\n\nVuoi confermare e inviare l'ordine su WhatsApp?`;

        if (confirm(summary)) {
            const orderText = `Ciao! Vorrei prenotare questi prodotti:\n\n${orderList}\n*TOTALE: ${total.toFixed(2)}€*`;
            const waLink = `https://wa.me/${PHONE_NUMBER}?text=${encodeURIComponent(orderText)}`;
            window.open(waLink, '_blank');
        }
    }

    loadProducts();
</script>

</body>
</html>
